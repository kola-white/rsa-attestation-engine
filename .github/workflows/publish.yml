name: Publish to DigitalOcean Spaces

on:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      DO_REGION: ${{ vars.DO_REGION }}             # e.g., nyc3
      DO_SPACE:  ${{ vars.DO_SPACE }}              # your Space name
      DO_ENDPOINT: ${{ vars.DO_ENDPOINT }}         # e.g., https://nyc3.digitaloceanspaces.com
      CDN_ENDPOINT_ID: ${{ vars.CDN_ENDPOINT_ID }} # optional

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Ensure endpoint is set (keep your validation step) ---
      - name: Validate DigitalOcean variables and set DO_ENDPOINT
        run: |
          if [ -z "$DO_SPACE" ]; then
            echo "ERROR: DO_SPACE is not set. Set repo variable 'DO_SPACE'." >&2
            exit 1
          fi
          if [ -z "$DO_ENDPOINT" ] && [ -z "$DO_REGION" ]; then
            echo "ERROR: Neither DO_ENDPOINT nor DO_REGION is set. Set at least one repo variable." >&2
            exit 1
          fi
          if [ -z "$DO_ENDPOINT" ] && [ -n "$DO_REGION" ]; then
            echo "DO_ENDPOINT=https://$DO_REGION.digitaloceanspaces.com" >> "$GITHUB_ENV"
          fi
          if [ -z "$DO_ENDPOINT" ]; then
            echo "ERROR: DO_ENDPOINT could not be determined." >&2
            exit 1
          fi
          echo "DO_ENDPOINT set to: ${DO_ENDPOINT}"
          echo "DO_SPACE set to: ${DO_SPACE}"

      # --- Install AWS CLI v2 (bundled) — DO NOT use apt or pip ---
      - name: Install AWS CLI v2
        run: |
          curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          sudo apt-get update -y && sudo apt-get install -y unzip
          unzip -q awscliv2.zip
          sudo ./aws/install --bin-dir /usr/local/bin --install-dir /usr/local/aws-cli --update
          aws --version

      # --- Configure Spaces creds (uses GitHub Secrets) ---
      - name: Configure AWS creds for Spaces
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
        run: |
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region "${DO_REGION:-us-east-1}"  # region required; ignored by Spaces

      # --- Quick sanity check before uploads ---
      - name: Verify Spaces access
        run: |
          aws --endpoint-url "$DO_ENDPOINT" s3 ls "s3://$DO_SPACE/" || { echo "List failed"; exit 1; }

      # (Your build steps could go here if needed, before CDN purge)
      # - name: Build JWKS
      #   run: node scripts/make-jwks.mjs
      # ... etc.

      - name: Detect DO_PAT presence
        run: |
          if [ -n "${{ secrets.DO_PAT }}" ]; then
            echo "HAS_DO_PAT=true" >> "$GITHUB_ENV"
          else
            echo "HAS_DO_PAT=false" >> "$GITHUB_ENV"
          fi

      - name: Install doctl
        if: ${{ env.HAS_DO_PAT == 'true' && env.CDN_ENDPOINT_ID != '' }}
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_PAT }}

      - name: Purge CDN cache
        if: ${{ env.HAS_DO_PAT == 'true' && env.CDN_ENDPOINT_ID != '' }}
        run: |
          doctl compute cdn flush "$CDN_ENDPOINT_ID" \
            --files "/trust/jwks.json" \
            --files "/status/statuslist.json"
