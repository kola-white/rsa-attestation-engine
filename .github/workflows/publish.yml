name: Publish to DigitalOcean Spaces

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest

    env:
      CDN_ENDPOINT_ID: ${{ vars.CDN_ENDPOINT_ID }} # Set this repo variable if you want CDN purge

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.5'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Publish artifacts to DigitalOcean Spaces
        env:
          DO_SPACES_KEY:    ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACE:         ${{ vars.DO_SPACE }}  # "hapis"
          DO_REGION:        ${{ vars.DO_REGION }} # "sfo3"
          DO_ENDPOINT:      ${{ vars.DO_ENDPOINT }} # "https://sfo3.digitaloceanspaces.com"
          TRUST_BASE_URL:   https://hapis.sfo3.cdn.digitaloceanspaces.com
        run: npx tsx scripts/publish.ts

      - name: Detect DO_PAT presence
        run: |
          if [ -n "${{ secrets.DO_PAT }}" ]; then
            echo "HAS_DO_PAT=true" >> "$GITHUB_ENV"
          else
            echo "HAS_DO_PAT=false" >> "$GITHUB_ENV"
          fi

      - name: Install doctl
        if: ${{ env.HAS_DO_PAT == 'true' && env.CDN_ENDPOINT_ID != '' }}
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_PAT }}

      - name: Purge CDN cache
        if: ${{ env.HAS_DO_PAT == 'true' && env.CDN_ENDPOINT_ID != '' }}
        run: |
          doctl compute cdn flush "$CDN_ENDPOINT_ID" \
            --files "/trust/jwks.json" \
            --files "/status/statuslist.json"
