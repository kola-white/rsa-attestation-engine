services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - evt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 2s
      retries: 20

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      EVT_API_ADDR: "0.0.0.0:8080"
      KRATOS_PUBLIC_BASE_URL: "${KRATOS_PUBLIC_BASE_URL}"

      # === REQUIRED AUTH SECRETS ===
      EVT_JWT_SECRET: "${EVT_JWT_SECRET}"
      EVT_DB_DSN: "${EVT_DB_DSN}"
      EVT_REFRESH_TOKEN_HMAC_KEY: "${EVT_REFRESH_TOKEN_HMAC_KEY}"

      EVT_KRATOS_PUBLIC_URL: "https://auth.cvera.app"
      EVT_JWT_ISS: "${EVT_JWT_ISS}"
      EVT_JWT_AUD: "${EVT_JWT_AUD}"

      # DB inside docker network
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"

      # Your REAL DigitalOcean Spaces settings:
      DO_ENDPOINT: "${DO_ENDPOINT}"
      DO_REGION: "${DO_REGION}"
      EVT_S3_BUCKET: "${EVT_S3_BUCKET}"
      DO_SPACES_KEY: "${DO_SPACES_KEY}"
      DO_SPACES_SECRET: "${DO_SPACES_SECRET}"

    depends_on:
      db:
        condition: service_healthy

  kratos:
    image: oryd/kratos:v1.1.0
    command: serve --config /etc/config/kratos/kratos.yml
    volumes:
      - /opt/cvera/rsa-attestation-engine/infra/kratos/kratos.yml:/etc/config/kratos/kratos.yml
      - /opt/cvera/rsa-attestation-engine/infra/kratos/identity.schema.json:/etc/config/kratos/identity.schema.json
    depends_on:
      - db
    ports:
      - "4434:4434"
      - "4435:4435"
    environment:
      DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/evt_kratos?sslmode=disable"
      KRATOS_SECRET_DEFAULT: "${KRATOS_SECRET_DEFAULT}"
      KRATOS_SECRET_COOKIE: "${KRATOS_SECRET_COOKIE}"

volumes:
  evt_pgdata:
