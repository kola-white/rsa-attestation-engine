services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: evt
    ports:
      - "5432:5432"
    volumes:
      - evt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evt"]
      interval: 2s
      timeout: 2s
      retries: 20

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      EVT_API_ADDR: "0.0.0.0:8080"

      # DB inside docker network
      DATABASE_URL: "postgres://postgres:devpass@db:5432/evt?sslmode=disable"

      # Your REAL DigitalOcean Spaces settings:
      DO_ENDPOINT: "${DO_ENDPOINT}"
      DO_REGION: "${DO_REGION}"
      EVT_S3_BUCKET: "${EVT_S3_BUCKET}"
      DO_SPACES_KEY: "${DO_SPACES_KEY}"
      DO_SPACES_SECRET: "${DO_SPACES_SECRET}"

    depends_on:
      db:
        condition: service_healthy

volumes:
  evt_pgdata:

  

